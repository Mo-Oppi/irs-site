<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Article — Institut de Recherche Scientifique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f0ece3;--bg2:#e8e3d8;--text:#1a1917;--mid:#3d3b35;--muted:#6b6860;--red:#a51c2e;--red2:#7a1220;--line:#c8c2b5;--serif:'EB Garamond',Georgia,serif}
    @media(prefers-color-scheme:dark){:root{--bg:#181714;--bg2:#211f1c;--text:#e8e3d8;--mid:#c4bdb3;--muted:#7a756d;--red:#c4263b;--red2:#e03a50;--line:#332f2a}}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--serif);font-size:18px;line-height:1.78;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
    a{color:inherit;text-decoration:none}
    nav{border-bottom:1px solid var(--line);padding:0 2.5rem;position:sticky;top:0;z-index:100;background:var(--bg)}
    .nav-inner{max-width:1360px;margin:0 auto;display:flex;align-items:center;height:60px;gap:2rem}
    .nav-logo{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
    .logo-sq{width:36px;height:36px;background:var(--red);display:flex;align-items:center;justify-content:center}
    .logo-sq svg{width:20px;height:20px}
    .logo-txt{font-size:.72rem;font-weight:700;line-height:1.25}
    .nav-links{display:flex;gap:2rem;list-style:none;flex:1;justify-content:center}
    .nav-links a{font-size:.85rem;color:var(--muted);transition:color .15s}
    .nav-links a:hover{color:var(--text)}
    .nav-r{display:flex;align-items:center;gap:1rem}
    .btn-red{background:var(--red);color:#fff;font-family:var(--serif);font-size:.84rem;font-weight:600;padding:.32rem 1rem;display:inline-block;transition:background .15s}
    .btn-red:hover{background:var(--red2);color:#fff}
    .nav-lang{font-size:.76rem;font-weight:700;color:var(--muted)}

    .breadcrumb{border-bottom:1px solid var(--line);padding:.5rem 2.5rem;font-size:.8rem;color:var(--muted)}
    .breadcrumb a{color:var(--red)}
    .breadcrumb a:hover{text-decoration:underline}

    .article-wrap{max-width:700px;margin:0 auto;padding:4rem 2rem 6rem}
    .article-header{text-align:center;margin-bottom:3rem}
    .art-category{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:.9rem}
    .art-title{font-size:clamp(1.8rem,4.5vw,2.8rem);font-weight:700;line-height:1.12;margin-bottom:1.6rem}
    .art-author{font-size:1rem;font-variant:small-caps;font-weight:600;letter-spacing:.08em;color:var(--mid);margin-bottom:.3rem}
    .art-date{font-size:.88rem;font-variant:small-caps;letter-spacing:.1em;color:var(--muted);margin-bottom:.3rem}
    .art-journal{font-size:.84rem;font-style:italic;color:var(--muted);margin-bottom:1.6rem}
    .dots{text-align:center;letter-spacing:4px;color:var(--line);margin:1.5rem 0;font-size:.7rem}
    .art-actions{display:flex;justify-content:center;gap:.7rem;margin-bottom:1.5rem}
    .btn-action{background:var(--red);color:#fff;font-family:var(--serif);font-size:.88rem;font-weight:600;padding:.4rem 1.3rem;border:none;cursor:pointer;display:inline-block;transition:background .15s}
    .btn-action:hover{background:var(--red2);color:#fff}
    .btn-action-out{background:transparent;color:var(--red);border:1.5px solid var(--red)}
    .btn-action-out:hover{background:var(--red);color:#fff}

    .art-body{font-size:1rem;line-height:1.82;text-align:justify}
    .art-body h2{font-size:1.12rem;font-weight:700;text-decoration:underline;text-underline-offset:3px;margin:2.5rem 0 .7rem}
    .art-body h3{font-size:1.05rem;font-weight:600;font-style:italic;margin:2rem 0 .5rem}
    .art-body p{margin-bottom:1rem}
    .art-body blockquote{border-left:3px solid var(--red);padding:.5rem 1rem;margin:1.5rem 0;font-style:italic;color:var(--mid)}
    .art-body ul,.art-body ol{margin:.8rem 0 1rem 1.5rem}
    .art-body li{margin-bottom:.35rem}
    .art-body a{color:var(--red)}
    .art-body a:hover{text-decoration:underline}
    .art-body sup{font-size:.68rem;vertical-align:super;color:var(--red)}

    .art-excerpt-block{font-size:1.02rem;font-style:italic;color:var(--mid);border-left:3px solid var(--red);padding:.6rem 1.2rem;margin-bottom:2rem;line-height:1.75}

    .footnotes{margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--line)}
    .footnotes h4{font-size:.78rem;font-variant:small-caps;letter-spacing:.1em;color:var(--muted);margin-bottom:.8rem}
    .footnotes ol{margin-left:1.2rem}
    .footnotes li{font-size:.8rem;color:var(--muted);line-height:1.65;margin-bottom:.35rem}

    .related{border-top:1px solid var(--line);max-width:1100px;margin:0 auto;padding:2.5rem 2rem 3rem}
    .related h3{font-size:1rem;font-weight:700;margin-bottom:1.4rem;padding-bottom:.6rem;border-bottom:1px solid var(--line)}
    .related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
    .rel-item{}
    .rel-cat{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:.3rem}
    .rel-title a{font-size:.92rem;font-weight:600;line-height:1.35;color:var(--text)}
    .rel-title a:hover{color:var(--red)}
    .rel-meta{font-size:.74rem;color:var(--muted);margin-top:.2rem;font-variant:small-caps}
    .seed-placeholder{font-style:italic;color:var(--muted);font-size:.9rem;text-align:center;padding:2rem 0}

    footer{border-top:1px solid var(--line);margin-top:2rem}
    .foot{max-width:1360px;margin:0 auto;padding:1.5rem 2.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
    .foot-logo{display:flex;align-items:center;gap:.5rem}
    .foot-logo-sq{width:28px;height:28px;background:var(--red);display:flex;align-items:center;justify-content:center}
    .foot-name{font-size:.78rem;font-weight:700;color:var(--mid)}
    .foot-cc{font-size:.72rem;color:var(--muted)}

    @media(max-width:600px){.nav-links{display:none}.related-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="logo-sq"><svg viewBox="0 0 24 24" fill="none"><polygon points="12,2 22,7 22,17 12,22 2,17 2,7" stroke="white" stroke-width="1.5"/><line x1="12" y1="2" x2="12" y2="22" stroke="white" stroke-width="1"/><line x1="2" y1="7" x2="22" y2="17" stroke="white" stroke-width="1"/><line x1="22" y1="7" x2="2" y2="17" stroke="white" stroke-width="1"/></svg></div>
      <span class="logo-txt">Institut de<br>Recherche<br>Scientifique</span>
    </a>
    <ul class="nav-links">
      <li><a href="#">Bibliothèque</a></li>
      <li><a href="code-ue.html">Droit de l'UE</a></li>
      <li><a href="#">Thématiques</a></li>
      <li><a href="#">À propos</a></li>
      <li><a href="#">Newsletter</a></li>
    </ul>
    <div class="nav-r">
      <a href="admin.html" class="btn-red">Publier</a>
      <span class="nav-lang">FR</span>
    </div>
  </div>
</nav>
<div class="breadcrumb">
  <a href="index.html">Accueil</a> › <a href="#">Articles</a> › <span id="bcTitle">Article</span>
</div>

<article class="article-wrap" id="articleWrap">
  <div id="articleContent">
    <p style="text-align:center;color:var(--muted);font-style:italic;padding:4rem 0">Chargement de l'article…</p>
  </div>
</article>

<section class="related" id="relatedSection" style="display:none">
  <h3>Articles liés</h3>
  <div class="related-grid" id="relatedGrid"></div>
</section>

<footer>
  <div class="foot">
    <div class="foot-logo">
      <div class="foot-logo-sq"><svg viewBox="0 0 24 24" fill="none" width="16" height="16"><polygon points="12,2 22,7 22,17 12,22 2,17 2,7" stroke="white" stroke-width="1.5"/><line x1="12" y1="2" x2="12" y2="22" stroke="white" stroke-width="1"/></svg></div>
      <span class="foot-name">Institut de Recherche Scientifique</span>
    </div>
    <span class="foot-cc">Contenu sous licence CC BY-SA 4.0</span>
  </div>
</footer>

<script>
const SEED=[
  {id:'seed1',title:'Intrication quantique et information\u00a0: au-del\u00e0 du paradoxe EPR',author:'Dr. Sophie Bernard',date:'2025-04-15',category:'Physique & Cosmologie',excerpt:'Une revue des derni\u00e8res exp\u00e9riences sur l\u2019intrication \u00e0 longue distance et ses implications pour la cryptographie quantique.',content:'<h2>R\u00e9sum\u00e9</h2><p>L\u2019intrication quantique constitue l\u2019un des ph\u00e9nom\u00e8nes les plus surprenants de la m\u00e9canique quantique. Depuis les premi\u00e8res exp\u00e9riences d\u2019Aspect en 1982, la physique exp\u00e9rimentale a progressivement referm\u00e9 l\u2019ensemble des failles (\u00abloopholes\u00bb) laiss\u00e9es ouvertes par les tests de Bell.</p><h2>Introduction</h2><p>Le paradoxe EPR (Einstein, Podolsky, Rosen, 1935) interrogeait la compl\u00e9tude de la th\u00e9orie quantique. Einstein esp\u00e9rait qu\u2019une th\u00e9orie \u00e0 variables cach\u00e9es locales permettrait de retrouver un r\u00e9alisme classique. Les travaux de Bell (1964) puis leur v\u00e9rification exp\u00e9rimentale ont d\u00e9finitivement clos ce d\u00e9bat.</p>',published:true,journal:'',doi:'',footnotes:'',createdAt:1744665600000},
  {id:'seed2',title:'CRISPR-Cas9\u00a0: \u00e9tat de l\u2019art et perspectives th\u00e9rapeutiques en 2025',author:'Prof. Luc Morin & Dr. Yasmine A\u00efd',date:'2025-03-02',category:'Biologie & G\u00e9n\u00e9tique',excerpt:'Cinq ans apr\u00e8s les premi\u00e8res applications cliniques, un bilan rigoureux des succ\u00e8s, des limites et des questions \u00e9thiques ouvertes.',content:'<h2>R\u00e9sum\u00e9</h2><p>L\u2019outil d\u2019\u00e9dition du g\u00e9nome CRISPR-Cas9 a transform\u00e9 la biologie mol\u00e9culaire depuis sa description comme syst\u00e8me d\u2019\u00e9dition programmable en 2012. Cet article propose un bilan des applications cliniques autoris\u00e9es \u00e0 ce jour.</p>',published:true,journal:'',doi:'',footnotes:'',createdAt:1740873600000},
  {id:'seed3',title:'R\u00e9troactions climatiques non-lin\u00e9aires\u00a0: mod\u00e9lisation et incertitudes',author:'Dr. Thomas Lefeuvre',date:'2025-01-18',category:'Climatologie',excerpt:'Analyse des boucles de r\u00e9troaction amplificatrices dans les mod\u00e8les climatiques.',content:'<h2>R\u00e9sum\u00e9</h2><p>Les mod\u00e8les climatiques contemporains int\u00e8grent un nombre croissant de boucles de r\u00e9troaction dont certaines pr\u00e9sentent des comportements non-lin\u00e9aires susceptibles d\u2019amplifier consid\u00e9rablement le r\u00e9chauffement.</p>',published:true,journal:'',doi:'',footnotes:'',createdAt:1737158400000}
];

function getAllArticles(){
  try{
    const stored=JSON.parse(localStorage.getItem('irs_articles')||'[]');
    const ids=stored.map(a=>a.id);
    return [...stored,...SEED.filter(s=>!ids.includes(s.id))].filter(a=>a.published);
  }catch(e){return SEED;}
}

function fmtDate(d){
  if(!d)return '';
  try{return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});}catch(e){return d;}
}

function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

function render(){
  const id=getParam('id');
  const all=getAllArticles();
  let art=id?all.find(a=>a.id===id):null;
  if(!art&&id){
    // try to find in all (including drafts for preview)
    try{
      const stored=JSON.parse(localStorage.getItem('irs_articles')||'[]');
      art=stored.find(a=>a.id===id);
    }catch(e){}
  }
  if(!art){
    document.getElementById('articleContent').innerHTML='<p class="seed-placeholder">Article introuvable. <a href="index.html" style="color:var(--red)">Retour \u00e0 l\u2019accueil</a></p>';
    return;
  }

  document.title=art.title+' \u2014 Institut de Recherche Scientifique';
  document.getElementById('bcTitle').textContent=art.title;

  const doiBtn=art.doi?`<a href="${art.doi}" target="_blank" class="btn-action btn-action-out">Lien externe</a>`:'';

  document.getElementById('articleContent').innerHTML=`
    <header class="article-header">
      ${art.category?`<p class="art-category">${art.category}</p>`:''}
      <h1 class="art-title">${art.title}</h1>
      <p class="art-author">${art.author||''}</p>
      ${art.date?`<p class="art-date">${fmtDate(art.date)}</p>`:''}
      ${art.journal?`<p class="art-journal">${art.journal}</p>`:''}
      <div class="dots">&middot; &middot; &middot; &middot; &middot; &middot; &middot; &middot;</div>
      <div class="art-actions">
        <button class="btn-action" onclick="window.print()">PDF</button>
        ${doiBtn}
      </div>
      <div class="dots">&middot; &middot; &middot; &middot; &middot; &middot; &middot; &middot;</div>
    </header>
    ${art.excerpt?`<p class="art-excerpt-block">${art.excerpt}</p>`:''}
    <div class="art-body">${art.content||'<p><em>Contenu non disponible.</em></p>'}</div>
    ${art.footnotes?`<div class="footnotes"><h4>Notes</h4><ol>${art.footnotes.split('\n').filter(Boolean).map(n=>`<li>${n.replace(/^\d+\.\s*/,'')}</li>`).join('')}</ol></div>`:''}
  `;

  // Related
  const related=all.filter(a=>a.id!==art.id).slice(0,3);
  if(related.length){
    document.getElementById('relatedSection').style.display='block';
    document.getElementById('relatedGrid').innerHTML=related.map(r=>`
      <div class="rel-item">
        <p class="rel-cat">${r.category||'Article'}</p>
        <p class="rel-title"><a href="article.html?id=${r.id}">${r.title}</a></p>
        <p class="rel-meta">${r.author} &middot; ${fmtDate(r.date)}</p>
      </div>`).join('');
  }
}

render();
</script>
</body>
</html>
