<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Code de droit de l'Union européenne — IRS</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2ede4;--bg2:#e9e2d8;--bg3:#fff;
  --tx:#1a1917;--mid:#3d3b35;--mu:#6e6960;
  --red:#a51c2e;--redh:rgba(165,28,46,.14);
  --ln:#ccc7bc;--f:'EB Garamond',Georgia,serif;
  --toc-w:255px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#181614;--bg2:#1f1c19;--bg3:#252220;
  --tx:#e5dfd4;--mid:#bdb5ab;--mu:#7a736a;
  --red:#c4263b;--redh:rgba(196,38,59,.15);--ln:#302c28
}}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--f);font-size:19px;line-height:1.78;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* NAV */
.nav{border-bottom:1px solid var(--ln);padding:0 1.5rem;position:sticky;top:0;z-index:200;background:var(--bg)}
.navi{display:flex;align-items:center;height:60px;gap:1.8rem;max-width:1380px;margin:0 auto}
.logo{display:flex;align-items:center;gap:.55rem;flex-shrink:0}
.lsq{width:40px;height:40px;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lsq svg{width:22px;height:22px}
.ltx{font-size:.8rem;font-weight:700;line-height:1.26;letter-spacing:.01em}
.nl{display:flex;gap:3rem;list-style:none;flex:1;justify-content:center;margin:0;padding:0}
.nl a{font-size:.94rem;font-weight:500;color:var(--mu);transition:color .15s}
.nl a:hover,.nl a.on{color:var(--tx)}
.nr{display:flex;align-items:center;gap:.9rem}
.btr{background:var(--red);color:#fff;font-family:var(--f);font-size:.84rem;font-weight:600;padding:.33rem 1rem;display:inline-block;transition:background .15s}
.btr:hover{background:#7a1220;color:#fff}


/* PERMALINK */
.plink{background:none;border:none;cursor:pointer;color:var(--mu);font-size:.88rem;padding:.1rem .35rem;margin-left:.5rem;opacity:0;transition:opacity .15s;vertical-align:middle;border-radius:3px;line-height:1}
.art:hover .plink{opacity:1}
.plink:hover{color:var(--red);background:var(--redh)}

/* BC */
.bc{border-bottom:1px solid var(--ln);padding:.42rem 1.5rem;font-size:.8rem;color:var(--mu)}
.bc a{color:var(--red)}

/* SHELL — utilise CSS variable pour animer proprement */
.shell{display:flex;height:calc(100vh - 137px);overflow:hidden}

/* TOC */
.toc{
  background:var(--bg2);border-right:1px solid var(--ln);
  display:flex;flex-direction:column;flex-shrink:0;
  width:var(--toc-w);min-width:var(--toc-w);
  transition:width .25s ease,min-width .25s ease;
  overflow:hidden;
}
.toc.shut{width:44px;min-width:44px}
.toc-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:.45rem .85rem;border-bottom:1px solid var(--ln);
  flex-shrink:0;background:#3d3b35;min-height:38px
}
.toc-lbl{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.9);white-space:nowrap;overflow:hidden;transition:opacity .2s}
.toc.shut .toc-lbl{opacity:0;width:0}
.toc-tog{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.85);font-size:1.2rem;line-height:1;padding:.1rem;flex-shrink:0;transition:transform .25s}
.toc.shut .toc-tog{transform:rotate(180deg)}
.toc-sc{overflow-y:auto;overflow-x:hidden;flex:1;padding:.4rem 0;transition:opacity .2s}
.toc.shut .toc-sc{opacity:0;pointer-events:none}

.tg{margin-bottom:.1rem}
.tgb{
  display:flex;align-items:center;gap:.5rem;width:100%;
  background:none;border:none;cursor:pointer;
  padding:.5rem .85rem;font-size:.84rem;font-weight:700;
  color:var(--tx);font-family:var(--f);text-align:left;
  transition:background .1s;user-select:none;white-space:nowrap;overflow:hidden;
  letter-spacing:-.01em
}
.tgb:hover{background:rgba(0,0,0,.06)}
.tcar{font-size:.58rem;color:var(--red);transition:transform .2s;flex-shrink:0;display:inline-block}
.tgb.open .tcar{transform:rotate(90deg)}
.ti{display:none;padding-bottom:.2rem}
.ti.open{display:block}
.tsec{font-size:.67rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);padding:.5rem .85rem .18rem 1.4rem;white-space:nowrap;overflow:hidden;cursor:pointer;background:none;border:none;text-align:left;width:100%;font-family:var(--f);display:flex;align-items:center;gap:.35rem;transition:color .15s}
.tsec:hover{color:var(--tx)}
.tsec .scar{font-size:.55rem;color:var(--red);transition:transform .2s;display:inline-block;width:.7em;flex-shrink:0}
.tsec.tsec-open .scar{transform:rotate(90deg)}
.tsec.tsec-shut + button.tl,.tsec.tsec-shut ~ button.tl{display:none}
/* Group of articles after a section: each section "owns" buttons until next .tsec or .tdiv */
.tsec-group-shut{display:none}
.tl{
  display:block;padding:.28rem .85rem .28rem 1.4rem;
  font-size:.82rem;color:var(--mid);cursor:pointer;
  border-left:2px solid transparent;transition:all .12s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:none;border-top:none;border-right:none;border-bottom:none;
  text-align:left;font-family:var(--f);width:100%;
  line-height:1.4
}
.tl:hover{color:var(--red);background:var(--redh);border-left-color:var(--red)}
.tl.cur{color:var(--red);background:var(--redh);border-left-color:var(--red);font-weight:600}
.tdiv{height:1px;background:var(--ln);margin:.22rem .85rem;opacity:.55}

/* DOC */
.doc{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.dtop{border-bottom:1px solid var(--ln);padding:.62rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.7rem;flex-shrink:0;background:var(--bg)}
.dttl{font-size:1.05rem;font-weight:700}
.dcur{font-size:.8rem;color:var(--mu);font-style:italic}
.srchwrap{display:flex;align-items:center;border:1px solid var(--ln);background:var(--bg3);overflow:hidden}
.srchin{border:none;outline:none;background:transparent;font-family:var(--f);font-size:.86rem;padding:.37rem .75rem;width:200px;color:var(--tx)}
.srchin::placeholder{color:var(--mu)}
.scnt{font-size:.7rem;color:var(--mu);padding:0 .4rem;min-width:44px;text-align:center;white-space:nowrap}
.sb{background:none;border:none;border-left:1px solid var(--ln);cursor:pointer;padding:.3rem .48rem;color:var(--mu);font-size:.78rem}
.sb:hover{background:var(--bg2);color:var(--tx)}
.sc-row{display:flex;gap:.6rem;font-size:.77rem;color:var(--mu)}
.sc-row label{display:flex;align-items:center;gap:.3em;cursor:pointer}
.sc-row input{accent-color:var(--red)}

.dtb{border-bottom:1px solid var(--ln);padding:.36rem 2rem;display:flex;align-items:center;gap:.22rem;flex-shrink:0;background:var(--bg);flex-wrap:wrap}
.tb{border:1px solid var(--ln);background:var(--bg3);padding:.25rem .58rem;cursor:pointer;font-size:.79rem;color:var(--mid);font-family:var(--f);transition:background .1s;display:inline-flex;align-items:center;gap:.28rem;line-height:1}
.tb:hover{background:var(--bg2)}
.tb svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tsep{width:1px;height:17px;background:var(--ln);margin:0 .12rem}

.dsc{flex:1;overflow-y:auto}
.din{max-width:880px;padding:1.8rem 2.5rem 5rem;margin:0 auto}

/* ARTICLES */
.psep{border:none;border-top:2px solid var(--ln);margin:2.2rem 0 .8rem}
.plbl{font-size:.7rem;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--red);margin-bottom:.2rem}
.ptit{font-size:1.05rem;font-weight:700;text-transform:uppercase;line-height:1.25}
.tlbl{font-size:.67rem;letter-spacing:.09em;text-transform:uppercase;color:var(--mu);margin:.85rem 0 .1rem}
.ttit{font-size:.88rem;font-weight:700;text-transform:uppercase;color:var(--mid);margin-bottom:.35rem}
.art{padding:.95rem 0 .55rem;border-bottom:1px solid var(--ln);scroll-margin-top:72px}
.art:last-child{border-bottom:none}
.art.flash{background:var(--redh);border-left:3px solid var(--red);padding-left:.7rem;transition:background 1.5s}
.ahd{display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap;margin-bottom:.38rem}
.anum{font-size:1rem;font-weight:700;color:var(--red);letter-spacing:.01em}
.afmr{font-size:.78rem;color:var(--mu);font-style:italic;font-weight:400}
.abody{font-size:19px;line-height:1.82;text-align:justify}
.abody p{margin-bottom:.82rem}
.abody p:last-child{margin-bottom:0}
.abody strong{font-weight:700}
.abody em{font-style:italic}
.anote{font-size:.82rem;font-style:italic;color:var(--mu);margin-top:.45rem;padding-left:.65rem;border-left:2px solid var(--ln)}

/* TABS */
.atabs{display:flex;flex-wrap:wrap;gap:0;margin-top:.68rem;align-items:center;border-bottom:1px solid var(--ln);padding-bottom:.4rem}
.tablink{background:none;border:none;cursor:pointer;font-family:var(--f);font-size:.82rem;color:var(--mu);padding:.18rem .55rem .18rem 0;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;line-height:1.5}
.tablink:hover{color:var(--red)}
.tablink.on{color:var(--red);border-bottom-color:var(--red);font-weight:600}
.tabdot{color:var(--ln);margin:0 .3rem;font-size:.7rem;line-height:2}
.tabpanel{display:none;padding:.85rem 1.1rem;background:var(--bg2);border-left:3px solid var(--red);margin-top:.55rem;font-size:.9rem;line-height:1.8}
.tabpanel.on{display:block}
.tabempty{color:var(--mu);font-style:italic}

/* ANNOTATIONS */
/* Annotations — style encyclopédie juridique */
.agrp{margin-bottom:.9rem;padding-bottom:.9rem;border-bottom:1px solid var(--ln)}
.agrp:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
/* Tout le groupe coule comme un paragraphe dense */
.agrp-body{
  font-size:.88rem;line-height:1.72;
  text-align:justify;
  font-family:var(--f);color:var(--mid)
}
/* "1. Titre en gras." en tête */
.agttl{
  font-weight:700;font-size:.9rem;
  color:var(--tx);display:inline;
}
.agnum{color:var(--red);margin-right:.15rem}
/* ● avant chaque décision */
.abull{
  color:var(--red);margin:0 .25em 0 .35em;
  font-size:.8rem;vertical-align:.05em
}
/* Référence jurisprudentielle */
.ajur{font-style:italic;color:var(--mid)}
/* £ entre deux décisions dans le même groupe */
.apound{color:var(--mu);margin:0 .25em;font-size:.75rem}
/* ♦ avant l'apport */
.adiam{color:var(--mu);margin:0 .3em;font-size:.78rem}
/* L'apport : texte normal inline */
.aapport{color:var(--mid)}
/* ✦ séparateur biblio */
.astar{color:var(--mu);margin:0 .3em;font-size:.75rem}
.abib{font-style:italic;color:var(--mu)}
.verbtn{background:none;border:none;cursor:pointer;font-family:var(--f);font-size:.82rem;color:var(--mu);padding:.18rem .55rem .18rem 0;border-bottom:1px dashed var(--ln);transition:color .15s,border-color .15s;line-height:1.5;margin-left:.35rem}
.verbtn:hover{color:var(--red);border-bottom-color:var(--red)}

/* SEARCH HL */
mark.hl{background:rgba(165,28,46,.17);color:inherit;border-radius:1px;padding:0 1px}
mark.hl.cur{background:rgba(165,28,46,.42);outline:1px solid var(--red)}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mbg.open{opacity:1;pointer-events:auto}
.mbox{background:var(--bg3);border:1px solid var(--ln);width:min(660px,92vw);max-height:80vh;display:flex;flex-direction:column}
.mhd{border-bottom:1px solid var(--ln);padding:.75rem 1.1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mhd h3{font-size:.97rem;font-weight:700}
.mcl{background:none;border:none;cursor:pointer;font-size:1.05rem;color:var(--mu)}
.mcl:hover{color:var(--red)}
.mbd{overflow-y:auto;padding:1.1rem 1.3rem;font-size:.9rem;line-height:1.78}
.vcard{border:1px solid var(--ln);padding:.9rem 1rem;margin-bottom:.8rem;background:var(--bg2)}
.vclbl{font-size:.68rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--red);margin-bottom:.42rem}

/* MOBILE NAV TOC OVERLAY */
.mob-toc-btn{display:none;align-items:center;justify-content:center;background:var(--red);color:#fff;border:none;cursor:pointer;width:40px;height:40px;font-size:1.1rem;flex-shrink:0}

/* PRINT */
@media print{.nav,.bc,.toc,.dtop,.dtb,.mbg{display:none!important}.shell{display:block;height:auto;overflow:visible}.doc{overflow:visible}.dsc{overflow:visible}.din{max-width:none;padding:1cm}body{font-size:11pt}.art{page-break-inside:avoid}}

/* RESPONSIVE */
@media(max-width:900px){
  .din{padding:1.2rem 1.4rem 4rem}
  .nl{display:none}
  .srchin{width:150px}
  .dtop{gap:.5rem}
  .navi{height:52px}
  .lsq{width:32px;height:32px}
  .lsq svg{width:17px;height:17px}
  .ltx{font-size:.74rem}
  .ltx{font-size:.75rem}
  .btr{font-size:.88rem;padding:.35rem 1rem}
}
@media(max-width:680px){
  .shell{height:calc(100vh - 72px)}
  .toc{
    position:fixed;top:72px;left:0;height:calc(100vh - 72px);
    z-index:100;transform:translateX(-100%);transition:transform .25s ease;
    width:290px!important;min-width:290px!important;
  }
  .toc.mob-open{transform:translateX(0)}
  .toc.shut{transform:translateX(-100%)}
  .toc-tog{display:none}
  .mob-toc-btn{display:flex}
  .mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
  .mob-overlay.on{display:block}
  .nav{padding:0 1rem}
  .navi{height:64px;gap:1rem}
  .lsq{width:38px;height:38px}
  .lsq svg{width:21px;height:21px}
  .ltx{display:none}
  .bc{padding:.35rem 1rem}
  .dtop{padding:.5rem 1rem}
  .dtb{padding:.3rem 1rem;flex-wrap:wrap}
  .din{padding:1rem 1rem 4rem;max-width:none}
  .abody{font-size:17px}
  .srchwrap{flex:1}
  .srchin{width:100px}
  .btr{font-size:.88rem;padding:.35rem 1rem}
}
<!-- v2 -->
/* Rich apport display with multi-level plans */
.cmp-content{font-size:.9rem;line-height:1.8;color:var(--tx)}
.cmp-content p{margin:.4em 0}
.cmp-content h3{font-size:1rem;font-weight:700;margin:1em 0 .3em}
/* Annotations — format inline type encyclopédie juridique */
.agrp{margin:0 0 1.2rem 0}
.agttl-line{
  margin:.5rem 0 .35rem 0;font-size:.96rem;line-height:1.5;
  color:var(--tx);font-weight:700
}
.agttl-line .agnum{color:var(--red);font-weight:700;margin-right:.2em}
.agrp-inline{
  margin:.2rem 0 .35rem 0;font-size:.92rem;line-height:1.75;
  color:var(--tx);text-align:justify
}
.aapport-inline{color:var(--tx)}
.abull{color:var(--red);font-size:.72em;margin:0 .15em 0 .3em;vertical-align:middle}
.ajur{font-style:italic;color:var(--mid)}
.astar{color:var(--red);font-size:.82em;margin:0 .2em 0 .25em}
.abib{font-style:italic;color:var(--mu)}
.aapport-rich{
  margin-top:.6rem;padding:.6rem .9rem;
  background:var(--bg3);border-left:2px solid var(--ln);
  font-size:.87rem;line-height:1.65;color:var(--mid);
  font-family:var(--f)
}
.aapport-rich p{margin:.35em 0}
.aapport-rich .plan-i{display:block;margin:.85rem 0 .3rem 0;font-size:1.04em;font-weight:700;color:var(--tx);border-top:1px solid var(--ln);padding-top:.7rem}
.aapport-rich .plan-i:first-child{border-top:none;padding-top:0}
.aapport-rich .plan-a{display:block;margin:.55rem 0 .2rem 1.4rem;font-size:1em;font-weight:700;color:var(--tx)}
.aapport-rich .plan-1{display:block;margin:.38rem 0 .18rem 2.8rem;font-size:.96em;font-weight:600;color:var(--mid)}
.aapport-rich .plan-a-low{display:block;margin:.28rem 0 .14rem 4.2rem;font-size:.94em;font-style:italic;color:var(--mid)}
.aapport-rich .adiam{font-size:.88em;margin-right:.3em}
/* Title on its own line */
.agttl{font-weight:700;margin-bottom:.35rem;font-size:.92rem}
.agttl .agnum{color:var(--red);margin-right:.25em}
</style>
</head>

<div class="shell" id="shell">

<!-- TOC -->
<aside class="toc" id="toc">
  <div class="toc-hd">

    <button class="toc-tog" id="tocTogBtn" onclick="toggleTOC()" title="Réduire">‹</button>
  </div>
  <div class="toc-sc" id="tocSc">

    <div class="tg">
      <button class="tgb open" id="tgbTUE" onclick="tglGrp('TUE')">
        <span class="tcar" id="carTUE">▸</span>
        <span>TUE — Traité sur l'Union européenne</span>
      </button>
      <div class="ti open" id="tiTUE">
        <button class="tsec tsec-open" onclick="tglSec('sec-titre-i-dispositions-communes')" data-sid="sec-titre-i-dispositions-communes"><span class="scar">▸</span><span>Titre I — Dispositions communes</span></button>

        <button class="tl" onclick="goArt('tue-4')">Art. 4 — Principe d'attribution</button>
        <button class="tl" onclick="goArt('tue-5')">Art. 5 — Subsidiarité</button>
        <button class="tl" onclick="goArt('tue-6')">Art. 6 — Droits fondamentaux</button>
        <div class="tdiv"></div>
        <button class="tsec tsec-open" onclick="tglSec('sec-titre-ii-principes-d-mocratiqu')" data-sid="sec-titre-ii-principes-d-mocratiqu"><span class="scar">▸</span><span>Titre II — Principes démocratiques</span></button>

        <button class="tl" onclick="goArt('tue-11')">Art. 11 — Démocratie participative</button>
        <div class="tdiv"></div>
        <button class="tsec tsec-open" onclick="tglSec('sec-titre-iii-institutions')" data-sid="sec-titre-iii-institutions"><span class="scar">▸</span><span>Titre III — Institutions</span></button>
        <button class="tl" onclick="goArt('tue-13')">Art. 13 — Cadre institutionnel</button>
        <button class="tl" onclick="goArt('tue-17')">Art. 17 — La Commission</button>
        <div class="tdiv"></div>
        <button class="tsec tsec-open" onclick="tglSec('sec-titre-vi-dispositions-finales')" data-sid="sec-titre-vi-dispositions-finales"><span class="scar">▸</span><span>Titre VI — Dispositions finales</span></button>
        <button class="tl" onclick="goArt('tue-49')">Art. 49 — Adhésion</button>
        <button class="tl" onclick="goArt('tue-50')">Art. 50 — Retrait</button>
      </div>
    </div>

    <div class="tg">
      <button class="tgb" id="tgbTFUE" onclick="tglGrp('TFUE')">

<script>
// ═══════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════
var DB={
'tue-1':{t:'TUE',n:'1ᵉʳ',fm:'',
 pl:'Partie I — Traité sur l\'Union européenne (TUE)',tl:'Titre I — Dispositions communes',
 b:'<p>Par le présent traité, les <em>Hautes Parties contractantes</em> instituent entre elles une <strong>Union européenne</strong>, ci-après dénommée «\u202fl\'Union\u202f», à laquelle les États membres attribuent des compétences pour atteindre leurs objectifs communs.</p><p>Le présent traité marque une nouvelle étape dans le processus créant une union sans cesse plus étroite entre les peuples de l\'Europe, dans laquelle les décisions sont prises dans le plus grand respect possible du principe d\'ouverture et le plus près possible des citoyens.</p><p>L\'Union est fondée sur le présent traité et sur le traité sur le fonctionnement de l\'Union européenne. Ces deux traités ont la même valeur juridique. L\'Union se substitue et succède à la Communauté européenne.</p>',
 tabs:['jur','bib'],vers:[{l:'Version Maastricht (1992)',c:'Par le présent traité, les Hautes Parties contractantes instituent entre elles une Union européenne… (version originale, avant les modifications apportées par le Traité de Lisbonne de 2007.)'}]},
'tue-2':{t:'TUE',n:'2',fm:'',pl:'',tl:'',
 b:'<p>L\'Union est fondée sur les valeurs de respect de la dignité humaine, de liberté, de démocratie, d\'égalité, de l\'État de droit, ainsi que de respect des droits de l\'homme, y compris des droits des personnes appartenant à des minorités. Ces valeurs sont communes aux États membres dans une société caractérisée par le pluralisme, la non-discrimination, la tolérance, la justice, la solidarité et l\'égalité entre les femmes et les hommes.</p>',
 tabs:['jur','bib'],vers:[]},
'tue-3':{t:'TUE',n:'3',fm:'',pl:'',tl:'',
 b:'<p>L\'Union a pour but de promouvoir la paix, ses valeurs et le bien-être de ses peuples.</p><p>L\'Union offre à ses citoyens un espace de liberté, de sécurité et de justice sans frontières intérieures, au sein duquel est assurée la libre circulation des personnes.</p><p>L\'Union établit un marché intérieur. Elle œuvre pour le développement durable de l\'Europe fondé sur une croissance économique équilibrée et sur la stabilité des prix, une économie sociale de marché hautement compétitive, qui tend au plein emploi et au progrès social.</p>',
 tabs:['bib'],vers:[]},
'tue-4':{t:'TUE',n:'4',fm:'',pl:'',tl:'',
 b:'<p>Conformément à l\'article 5, toute compétence non attribuée à l\'Union dans les traités appartient aux États membres.</p><p>L\'Union respecte l\'égalité des États membres devant les traités ainsi que leur identité nationale, inhérente à leurs structures fondamentales politiques et constitutionnelles.</p><p>En vertu du principe de coopération loyale, l\'Union et les États membres se respectent et s\'assistent mutuellement dans l\'accomplissement des missions découlant des traités.</p>',
 tabs:['jur','bib'],vers:[]},
'tue-5':{t:'TUE',n:'5',fm:'',pl:'',tl:'',
 b:'<p>La délimitation des compétences de l\'Union est régie par le principe d\'attribution. L\'exercice des compétences de l\'Union est régi par les principes de subsidiarité et de proportionnalité.</p><p>En vertu du principe de subsidiarité, dans les domaines qui ne relèvent pas de sa compétence exclusive, l\'Union intervient seulement si, et dans la mesure où, les objectifs de l\'action envisagée ne peuvent pas être atteints de manière suffisante par les États membres.</p>',
 tabs:['jur','bib'],vers:[]},
'tue-6':{t:'TUE',n:'6',fm:'',pl:'',tl:'',
 b:'<p>L\'Union reconnaît les droits, les libertés et les principes énoncés dans la <em>Charte des droits fondamentaux de l\'Union européenne</em> du 7 décembre 2000, telle qu\'adaptée le 12 décembre 2007 à Strasbourg, laquelle a la même valeur juridique que les traités.</p><p>Les dispositions de la Charte n\'étendent en aucune manière les compétences de l\'Union telles que définies dans les traités.</p>',
 tabs:['jur','bib','cmp'],vers:[]},
'tue-9':{t:'TUE',n:'9',fm:'',pl:'',tl:'Titre II — Principes démocratiques',
 b:'<p>Dans toutes ses activités, l\'Union respecte le principe de l\'égalité de ses citoyens. Est citoyen de l\'Union toute personne ayant la nationalité d\'un État membre. La citoyenneté de l\'Union s\'ajoute à la citoyenneté nationale et ne la remplace pas.</p>',
 tabs:['bib'],vers:[]},
'tue-10':{t:'TUE',n:'10',fm:'',pl:'',tl:'',
 b:'<p>Le fonctionnement de l\'Union est fondé sur la démocratie représentative.</p><p>Les citoyens sont directement représentés, au niveau de l\'Union, au Parlement européen. Les États membres sont représentés au Conseil européen par leur chef d\'État ou de gouvernement.</p>',
 tabs:['bib'],vers:[]},
'tue-11':{t:'TUE',n:'11',fm:'',pl:'',tl:'',
 b:'<p>Les institutions donnent aux citoyens et aux associations représentatives la possibilité de faire connaître leurs points de vue dans tous les domaines d\'action de l\'Union.</p><p>Des citoyens de l\'Union, au nombre d\'un million au moins, ressortissants d\'un nombre significatif d\'États membres, peuvent inviter la Commission à soumettre une proposition appropriée.</p>',
 tabs:[],vers:[]},
'tue-13':{t:'TUE',n:'13',fm:'',pl:'',tl:'Titre III — Institutions',
 b:'<p>L\'Union dispose d\'un cadre institutionnel visant à promouvoir ses valeurs, poursuivre ses objectifs, servir ses intérêts et ceux de ses citoyens.</p><p>Les institutions de l\'Union sont : le Parlement européen ; le Conseil européen ; le Conseil ; la Commission européenne ; la Cour de justice de l\'Union européenne ; la Banque centrale européenne ; la Cour des comptes.</p>',
 tabs:['jur','bib'],vers:[]},
'tue-17':{t:'TUE',n:'17',fm:'',pl:'',tl:'',
 b:'<p>La Commission promeut l\'intérêt général de l\'Union et prend les initiatives appropriées à cette fin. Elle veille à l\'application des traités.</p><p>Sauf disposition contraire des traités, un acte législatif de l\'Union ne peut être adopté que sur proposition de la Commission.</p><p>Le mandat de la Commission est de cinq ans.</p>',
 tabs:['bib'],vers:[]},
'tue-49':{t:'TUE',n:'49',fm:'',pl:'',tl:'Titre VI — Dispositions finales',
 b:'<p>Tout État européen qui respecte les valeurs visées à l\'article 2 et s\'engage à les promouvoir peut demander à devenir membre de l\'Union.</p>',
 tabs:[],vers:[]},
'tue-50':{t:'TUE',n:'50',fm:'',pl:'',tl:'',
 note:'Cet article a été activé pour la première fois le 29 mars 2017 par le Royaume-Uni (Brexit).',
 b:'<p>Tout État membre peut décider, conformément à ses règles constitutionnelles, de se retirer de l\'Union.</p><p>L\'État membre qui décide de se retirer notifie son intention au Conseil européen. L\'Union négocie et conclut avec cet État un accord fixant les modalités de son retrait.</p><p>Les traités cessent d\'être applicables à l\'État concerné à partir de la date d\'entrée en vigueur de l\'accord de retrait ou, à défaut, deux ans après la notification.</p>',
 tabs:['jur','bib'],vers:[{l:'Version originale — Traité de Lisbonne (2007)',c:'Tout État membre peut décider, conformément à ses règles constitutionnelles, de se retirer de l\'Union… (texte non amendé depuis 2007.)'}]},
'tfue-1':{t:'TFUE',n:'1ᵉʳ',fm:'',
 pl:'Partie II — Traité sur le fonctionnement de l\'Union européenne (TFUE)',tl:'1ère partie — Principes',
 b:'<p>Le présent traité organise le fonctionnement de l\'Union et détermine les domaines, la délimitation et les modalités d\'exercice de ses compétences.</p><p>Le présent traité et le TUE constituent les traités sur lesquels l\'Union est fondée. Ces deux traités, qui ont la même valeur juridique, sont désignés par les termes «\u202fles traités\u202f».</p>',
 tabs:['bib'],vers:[]},
'tfue-3':{t:'TFUE',n:'3',fm:'',pl:'',tl:'',
 b:'<p>L\'Union dispose d\'une compétence exclusive dans les domaines suivants : a) l\'union douanière ; b) les règles de concurrence nécessaires au fonctionnement du marché intérieur ; c) la politique monétaire pour les États membres dont la monnaie est l\'euro ; d) la conservation des ressources biologiques de la mer ; e) la politique commerciale commune.</p>',
 tabs:['jur','bib'],vers:[]},
'tfue-4':{t:'TFUE',n:'4',fm:'',pl:'',tl:'',
 b:'<p>L\'Union dispose d\'une compétence partagée avec les États membres lorsque les traités lui attribuent une compétence qui ne relève pas des domaines visés aux articles 3 et 6.</p><p>Les compétences partagées s\'appliquent notamment aux domaines suivants : a) le marché intérieur ; b) la politique sociale ; c) la cohésion économique, sociale et territoriale ; d) l\'agriculture et la pêche ; e) l\'environnement ; f) la protection des consommateurs.</p>',
 tabs:['bib'],vers:[]},
'tfue-5':{t:'TFUE',n:'5',fm:'',pl:'',tl:'',
 b:'<p>Les États membres coordonnent leurs politiques économiques au sein de l\'Union. À cette fin, le Conseil adopte des mesures et notamment les grandes orientations de ces politiques.</p>',
 tabs:[],vers:[]},
'tfue-18':{t:'TFUE',n:'18',fm:'ex-art. 12 TCE',pl:'',tl:'2ème partie — Non-discrimination et citoyenneté',
 b:'<p>Dans le domaine d\'application des traités, et sans préjudice des dispositions particulières qu\'ils prévoient, est interdite toute discrimination exercée en raison de la nationalité.</p>',
 tabs:['jur','bib'],vers:[]},
'tfue-20':{t:'TFUE',n:'20',fm:'ex-art. 17 TCE',pl:'',tl:'',
 b:'<p>Il est institué une citoyenneté de l\'Union. Est citoyen de l\'Union toute personne ayant la nationalité d\'un État membre. La citoyenneté de l\'Union s\'ajoute à la citoyenneté nationale et ne la remplace pas.</p><p>Les citoyens de l\'Union jouissent des droits et sont soumis aux devoirs prévus par les traités, notamment : a) le droit de circuler et de séjourner librement sur le territoire des États membres ; b) le droit de vote aux élections au Parlement européen et aux élections municipales.</p>',
 tabs:['jur','bib'],vers:[]},
'tfue-21':{t:'TFUE',n:'21',fm:'ex-art. 18 TCE',pl:'',tl:'',
 b:'<p>Tout citoyen de l\'Union a le droit de circuler et de séjourner librement sur le territoire des États membres, sous réserve des limitations et conditions prévues par les traités.</p>',
 tabs:['jur'],vers:[]},
'tfue-26':{t:'TFUE',n:'26',fm:'ex-art. 14 TCE',pl:'',tl:'3ème partie — Politiques internes',
 b:'<p>L\'Union adopte les mesures destinées à établir ou assurer le fonctionnement du marché intérieur.</p><p>Le marché intérieur comporte un espace sans frontières intérieures dans lequel la libre circulation des marchandises, des personnes, des services et des capitaux est assurée.</p>',
 tabs:['bib'],vers:[]},
'tfue-34':{t:'TFUE',n:'34',fm:'ex-art. 28 TCE',pl:'',tl:'',
 note:'Interprété extensivement depuis l\'arrêt Dassonville (CJCE, 11 juill. 1974, aff. 8/74).',
 b:'<p>Les restrictions quantitatives à l\'importation ainsi que toutes mesures d\'effet équivalent sont interdites entre les États membres.</p>',
 tabs:['jur','bib'],vers:[]},
'tfue-45':{t:'TFUE',n:'45',fm:'ex-art. 39 TCE',pl:'',tl:'',
 b:'<p>La libre circulation des travailleurs est assurée à l\'intérieur de l\'Union.</p><p>Elle implique l\'abolition de toute discrimination, fondée sur la nationalité, entre les travailleurs des États membres, en ce qui concerne l\'emploi, la rémunération et les autres conditions de travail.</p>',
 tabs:['jur','bib'],vers:[]},
'tfue-101':{t:'TFUE',n:'101',fm:'ex-art. 81 TCE',pl:'',tl:'',
 b:'<p>Sont incompatibles avec le marché intérieur et interdits tous accords entre entreprises, toutes décisions d\'associations d\'entreprises et toutes pratiques concertées, qui sont susceptibles d\'affecter le commerce entre États membres et qui ont pour objet ou pour effet d\'empêcher, de restreindre ou de fausser le jeu de la concurrence.</p><p>Les accords ou décisions interdits en vertu du présent article sont nuls de plein droit.</p>',
 tabs:['jur','bib'],vers:[]},
'tfue-102':{t:'TFUE',n:'102',fm:'ex-art. 82 TCE',pl:'',tl:'',
 b:'<p>Est incompatible avec le marché intérieur et interdit le fait pour une ou plusieurs entreprises d\'exploiter de façon abusive une position dominante sur le marché intérieur ou dans une partie substantielle de celui-ci.</p>',
 tabs:['jur','bib'],vers:[]},
'tfue-107':{t:'TFUE',n:'107',fm:'ex-art. 87 TCE',pl:'',tl:'',
 b:'<p>Sauf dérogations prévues par les traités, sont incompatibles avec le marché intérieur les aides accordées par les États ou au moyen de ressources d\'État sous quelque forme que ce soit qui faussent ou qui menacent de fausser la concurrence en favorisant certaines entreprises ou certaines productions.</p>',
 tabs:['jur','bib'],vers:[]},
'tfue-258':{t:'TFUE',n:'258',fm:'ex-art. 226 TCE',pl:'',tl:'6ème partie — Dispositions institutionnelles',
 b:'<p>Si la Commission estime qu\'un État membre a manqué à une des obligations qui lui incombent en vertu des traités, elle émet un avis motivé à ce sujet, après avoir mis cet État en mesure de présenter ses observations.</p><p>Si l\'État en cause ne se conforme pas à cet avis dans le délai déterminé par la Commission, celle-ci peut saisir la Cour de justice de l\'Union européenne.</p>',
 tabs:['jur'],vers:[]},
'tfue-263':{t:'TFUE',n:'263',fm:'ex-art. 230 TCE',pl:'',tl:'',
 b:'<p>La Cour de justice de l\'Union européenne contrôle la légalité des actes législatifs, des actes du Conseil, de la Commission et de la Banque centrale européenne.</p><p>Toute personne physique ou morale peut former un recours contre les actes dont elle est le destinataire ou qui la concernent directement et individuellement.</p>',
 tabs:['jur','bib'],vers:[]},
'tfue-267':{t:'TFUE',n:'267',fm:'ex-art. 234 TCE',pl:'',tl:'',
 b:'<p>La Cour de justice de l\'Union européenne est compétente pour statuer, à titre préjudiciel : a) sur l\'interprétation des traités ; b) sur la validité et l\'interprétation des actes pris par les institutions, organes ou organismes de l\'Union.</p><p>Lorsqu\'une telle question est soulevée dans une affaire pendante devant une juridiction nationale dont les décisions ne sont pas susceptibles d\'un recours juridictionnel de droit interne, cette juridiction est tenue de saisir la Cour.</p>',
 tabs:['jur','bib'],vers:[{l:'Avant Lisbonne — Art. 234 TCE',c:'La Cour de justice est compétente pour statuer, à titre préjudiciel, sur l\'interprétation du présent traité… (texte TCE consolidé 2001)'}]},
'tfue-288':{t:'TFUE',n:'288',fm:'ex-art. 249 TCE',pl:'',tl:'',
 b:'<p>Pour exercer les compétences de l\'Union, les institutions adoptent des règlements, des directives, des décisions, des recommandations et des avis.</p><p>Le <strong>règlement</strong> a une portée générale. Il est obligatoire dans tous ses éléments et directement applicable dans tout État membre.</p><p>La <strong>directive</strong> lie tout État membre destinataire quant au résultat à atteindre, tout en laissant aux instances nationales la compétence quant à la forme et aux moyens.</p><p>La <strong>décision</strong> est obligatoire dans tous ses éléments. Les <strong>recommandations</strong> et les <strong>avis</strong> ne lient pas.</p>',
 tabs:['jur','bib'],vers:[]}
};

var tocOpen=true;

var fsz=19;

// ═══════════════════════════════════════════════════
//  BUILD ARTICLE ELEMENT

function buildEl(id){
  var d=DB[id]; if(!d) return null;
  var div=document.createElement('div');
  div.id='a-'+id; div.dataset.aid=id; div.className='art';
  var h='';
  if(d.pl){h+='<hr class="psep"/><p class="plbl">'+d.pl+'</p>';}
  if(d.tl){h+='<p class="tlbl">'+d.tl+'</p>';}
  h+='<div class="ahd"><span class="anum">Article '+d.n+'</span><button class="plink" onclick="copyLink(\''+id+'\')" title="Copier le lien permanent">&#128279;</button>';
  if(d.fm){h+='<span class="afmr">('+d.fm+')</span>';}
  h+='</div>';
  h+='<div class="abody">'+d.b+'</div>';
  if(d.note){h+='<p class="anote">'+d.note+'</p>';}
  // Tabs — admin settings override hardcoded defaults
  var lbls={jur:'Jurisprudence',bib:'Bibliographie',cmp:'Textes complémentaires'};
  var ALL_TAB_TYPES=['jur','bib','cmp'];
  var settings={};
  try{settings=JSON.parse(localStorage.getItem('irs_settings')||'{}');}catch(e){}
  var artSettings=settings[id]||null;
  var defaultTabs=(d.tabs||[]);
  // Build visible tabs list respecting per-tab admin choices independently.
  var visibleTabs=ALL_TAB_TYPES.filter(function(t){
    // Case 1: Admin has explicit setting for THIS tab → use it.
    if(artSettings && typeof artSettings[t]==='boolean'){
      return artSettings[t]===true;
    }
    // Case 2: No explicit admin choice → use hardcoded default.
    return defaultTabs.indexOf(t)>=0;
  });
  if(visibleTabs.length){
      h+='<div class="atabs">';
      visibleTabs.forEach(function(t,i){
        if(i>0) h+='<span class="tabdot">•</span>';
        h+='<button class="tablink" onclick="togTab(this,\''+id+'\',\''+t+'\')" data-aid="'+id+'" data-type="'+t+'">'+lbls[t]+'</button>';
      });
      // Show version button if:
      // - article settings explicitly enable it, OR
      // - settings not set AND article has version data (default behavior)
      var showVerBtn=false;
      if(artSettings){
        showVerBtn=artSettings.ver===true;
      } else {
        showVerBtn=(d.vers&&d.vers.length>0);
      }
      // Also check if admin added versions in localStorage
      try{
        var lsVers=JSON.parse(localStorage.getItem('irs_versions')||'{}');
        if(lsVers[id]&&lsVers[id].length) showVerBtn=true;
      }catch(e){}
      if(showVerBtn){
        h+='<span class="tabdot">•</span>';
        h+='<button class="verbtn" onclick="showVer(\''+id+'\')">Versions de l\'article</button>';
      }
      h+='</div>';
      visibleTabs.forEach(function(t){
        h+='<div class="tabpanel" id="tp-'+id+'-'+t+'"></div>';
      });
  }
  div.innerHTML=h;
  return div;
}

function renderRange(from,to){
  var c=document.getElementById('ac');
  for(var i=from;i<to;i++){
    var id=ORDER[i];
    if(!document.getElementById('a-'+id)){
      var el=buildEl(id);
      if(el) c.appendChild(el);
    }
  }
}

function prependRange(from,to){
  var c=document.getElementById('ac');
  for(var i=to-1;i>=from;i--){
    var id=ORDER[i];
    if(!document.getElementById('a-'+id)){
      var el=buildEl(id);
      if(el) c.insertBefore(el,c.firstChild);
    }
  }
}

// ═══════════════════════════════════════════════════
//  TOC GROUP TOGGLE — Fix: use IDs directly
// ═══════════════════════════════════════════════════
// Toggle individual TOC sections (Titre I, Titre II...)
function tglSec(sid){
  var btn=document.querySelector('button[data-sid="'+sid+'"]');
  if(!btn) return;
  var isOpen=btn.classList.contains('tsec-open');
  // Find all .tl buttons that follow this section, until next .tsec or .tdiv
  var siblings=[];
  var node=btn.nextElementSibling;
  while(node){
    if(node.classList.contains('tsec') || node.classList.contains('tdiv')) break;
    if(node.classList.contains('tl')) siblings.push(node);
    node=node.nextElementSibling;
  }
  if(isOpen){
    btn.classList.remove('tsec-open');
    btn.classList.add('tsec-shut');
    siblings.forEach(function(s){ s.style.display='none'; });
  } else {
    btn.classList.add('tsec-open');
    btn.classList.remove('tsec-shut');
    siblings.forEach(function(s){ s.style.display=''; });
  }
}

function tglGrp(name){
  var btn=document.getElementById('tgb'+name);
  var items=document.getElementById('ti'+name);
  if(!btn||!items) return;
  var isOpen=items.classList.contains('open');
  if(isOpen){
    items.classList.remove('open');
    btn.classList.remove('open');
  } else {
    items.classList.add('open');
    btn.classList.add('open');
  }
}

function setActiveTOC(id){
  document.querySelectorAll('.tl').forEach(function(l){ l.classList.remove('cur'); });
  document.querySelectorAll('.tl').forEach(function(l){
    var oc=l.getAttribute('onclick')||'';
    if(oc.indexOf("'"+id+"'")!==-1) l.classList.add('cur');
  });
}

// ═══════════════════════════════════════════════════
//  NAVIGATE TO ARTICLE
// ═══════════════════════════════════════════════════
function goArt(id){
  // Close mobile TOC if open
  var toc=document.getElementById('toc');
  if(toc.classList.contains('mob-open')){
    toc.classList.remove('mob-open');
    document.getElementById('mobOverlay').classList.remove('on');
  }
  var idx=ORDER.indexOf(id);
  if(idx<0) return;
  if(!document.getElementById('a-'+id)){
    var f=Math.max(0,idx-3), t=Math.min(ORDER.length,idx+5);
    if(idx>=re){ renderRange(re,t); re=t; }
    else if(idx<rs){ prependRange(f,rs); rs=f; }
  }
  setTimeout(function(){
    var el=document.getElementById('a-'+id);
    if(!el) return;
    el.scrollIntoView({behavior:'smooth',block:'start'});
    el.classList.add('flash');
    setTimeout(function(){ el.classList.remove('flash'); },2000);
    setActiveTOC(id);
    var d=DB[id];
    if(d) document.getElementById('dcur').textContent='Art. '+d.n+' '+d.t;
    history.replaceState(null,'','#'+id);
    // Auto-open TFUE group if navigating to TFUE article
    if(id.startsWith('tfue')){
      var ti=document.getElementById('tiTFUE');
      if(ti&&!ti.classList.contains('open')) tglGrp('TFUE');
    }
  },60);
}

// ═══════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════
function togTab(btn,id,type){
  var panel=document.getElementById('tp-'+id+'-'+type);
  if(!panel) return;
  var wasOn=panel.classList.contains('on');
  // Close all tabs for this article
  document.querySelectorAll('[id^="tp-'+id+'-"]').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('[data-aid="'+id+'"].tablink').forEach(function(b){ b.classList.remove('on'); });
  if(!wasOn){
    panel.classList.add('on');
    btn.classList.add('on');
    if(!panel.dataset.loaded) fillTab(id,type,panel);
  }
}

// ═══════════════════════════════════════════════════
//  FILL TAB — reads from localStorage (admin annotations)
// ═══════════════════════════════════════════════════
function fillTab(id,type,el){
  el.dataset.loaded='1';

  // Textes complémentaires : HTML brut (pas un tableau)
  if(type==='cmp'){
    var cmpAll={};
    try{cmpAll=JSON.parse(localStorage.getItem('irs_annots_cmp')||'{}'  );}catch(e){}
    var cmpHtml=cmpAll[id]||''  ;
    el.innerHTML=cmpHtml.trim()
      ?'<div class="cmp-content">'+cmpHtml+'</div>'
      :'<p class="tabempty">Aucun texte complémentaire pour le moment.</p>';
    return;
  }

  // Jurisprudence / Bibliographie : tableau de groupes
  var lsAnnots=[];
  try{
    var lsAll=JSON.parse(localStorage.getItem('irs_annots_'+type)||'{}'  );
    lsAnnots=lsAll[id]||[];
  }catch(e){}

  if(lsAnnots.length){
    renderAnnots(lsAnnots,el);
    return;
  }

  el.innerHTML='<p class="tabempty">Aucune annotation pour le moment.</p>';
}

function renderAnnots(data,el){
  var h='';
  data.forEach(function(g,gi){
    var entries=Array.isArray(g.entries)?g.entries:[];
    h+='<div class="agrp">';

    // Titre du groupe : sur sa propre ligne, normal (pas en majuscules)
    if(g.title){
      h+='<p class="agttl-line"><span class="agnum">'+(gi+1)+'.</span> '+g.title+'.</p>';
    }

    entries.forEach(function(en,ei){
      var js=en.ref||en.jur||en.jurisprudence||'';
      var bs=en.bib||en.bibliography||'';
      var ap=en.apport||'';
      var isRichApport = ap && /<p[^>]*class=['"]plan-/.test(ap);

      // Tout le reste sur UNE LIGNE qui coule : Apport — Décisions — Biblio
      h+='<p class="agrp-inline">';

      // Apport en premier (sauf si rich, qui est traité en bloc séparé)
      if(ap && !isRichApport){
        h+='<span class="aapport-inline">'+ap+'</span>';
      }

      // Décisions — séparées par puces, restent dans le flux
      if(js){
        var parts=js.split('\xa3').map(function(s){return s.trim();}).filter(Boolean);
        parts.forEach(function(p,pi){
          h+=' <span class="abull">&#9679;</span> <span class="ajur">'+p+'</span>';
        });
      }

      // Bibliographie — fin de ligne
      if(bs){
        h+=' <span class="astar">&#10022;</span> <span class="abib">'+bs+'</span>';
      }

      h+='.</p>';

      // Apport riche (plan I/A/1/a) — reste en bloc, attaché à la jurisprudence
      if(isRichApport){
        h+='<div class="aapport-rich">'+ap+'</div>';
      }
    });
    h+='</div>';
  });
  el.innerHTML=h||'<p class="tabempty">Aucune annotation.</p>';
}

//  SEARCH
// ═══════════════════════════════════════════════════
var sTimer;
function dSearch(){ clearTimeout(sTimer); sTimer=setTimeout(doSearch,220); }
function doSearch(){
  clearHL();
  var q=document.getElementById('si').value.trim();
  if(!q||q.length<2){ document.getElementById('sc').textContent=''; return; }
  if(ssc==='num'){
    // Normalize both user input and article numbers (handle "1", "1er", "1ᵉʳ", etc.)
    var qn=q.trim().toLowerCase().replace(/\s+/g,'').replace(/er|ᵉʳ|ʳ/g,'');
    var m=Object.keys(DB).find(function(k){
      var an=(DB[k].n||'').toLowerCase().replace(/<[^>]+>/g,'').replace(/\s+/g,'').replace(/er|ᵉʳ|ʳ/g,'');
      return an===qn;
    });
    if(m){ goArt(m); document.getElementById('sc').textContent='1 résultat'; }
    else { document.getElementById('sc').textContent='0 résultat'; }
    return;
  }
  var re2=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  walkHL(document.getElementById('ac'),re2);
  document.getElementById('sc').textContent=sm.length+(sm.length!==1?' occurrences':' occurrence');
  if(sm.length) navM(1);
}
function walkHL(node,re2){
  if(node.nodeType===3){
    if(!re2.test(node.textContent)) return;
    re2.lastIndex=0;
    var frag=document.createDocumentFragment(),t=node.textContent,last=0,m;
    while((m=re2.exec(t))!==null){
      frag.appendChild(document.createTextNode(t.slice(last,m.index)));
      var mk=document.createElement('mark'); mk.className='hl'; mk.textContent=m[0];
      sm.push(mk); frag.appendChild(mk); last=m.index+m[0].length;
    }
    frag.appendChild(document.createTextNode(t.slice(last)));
    node.parentNode.replaceChild(frag,node);
  } else if(node.nodeType===1&&['SCRIPT','STYLE','MARK'].indexOf(node.tagName)<0){
    Array.prototype.slice.call(node.childNodes).forEach(function(c){ walkHL(c,re2); });
  }
}
function clearHL(){
  document.querySelectorAll('mark.hl').forEach(function(m){ m.parentNode.replaceChild(document.createTextNode(m.textContent),m); });
  sm=[]; si2=-1; document.getElementById('sc').textContent='';
}
function navM(dir){
  if(!sm.length) return;
  if(si2>=0&&sm[si2]) sm[si2].classList.remove('cur');
  si2=(si2+dir+sm.length)%sm.length;
  var mk=sm[si2];
  if(mk){ mk.classList.add('cur'); mk.scrollIntoView({behavior:'smooth',block:'center'}); }
  document.getElementById('sc').textContent=(si2+1)+'/'+sm.length;
}
function clearS(){ document.getElementById('si').value=''; clearHL(); }
function sKey(e){ if(e.key==='Enter') navM(1); if(e.key==='Escape') clearS(); }

// ═══════════════════════════════════════════════════
//  LAZY LOAD + INIT
// ═══════════════════════════════════════════════════
function setupIO(){
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(!e.isIntersecting) return;
      if(e.target.id==='sent-bot'&&re<ORDER.length){
        var ne=Math.min(re+4,ORDER.length);
        renderRange(re,ne); re=ne;
      }
      if(e.target.id==='sent-top'&&rs>0){
        var ns=Math.max(0,rs-4);
        prependRange(ns,rs); rs=ns;
      }
    });
  },{rootMargin:'250px 0px'});
  obs.observe(document.getElementById('sent-top'));
  obs.observe(document.getElementById('sent-bot'));

  // Active article tracking
  var ao=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting&&e.target.dataset.aid) setActiveTOC(e.target.dataset.aid);
    });
  },{root:document.getElementById('dsc'),rootMargin:'-15% 0px -70% 0px'});
  setTimeout(function(){
    document.querySelectorAll('.art').forEach(function(el){ ao.observe(el); });
  },300);
}

// Merge Supabase articles into DB (overrides hardcoded data)
// Extract numeric part from article id (tue-1 → 1, tfue-267 → 267, tue-1bis → 1.5)
function numFromId(id){
  var m=id.match(/-(\d+)([a-z]*)$/i);
  if(!m) return 9999;
  var base=parseInt(m[1],10);
  // Handle 'bis','ter'... as .1,.2 to keep in sequence
  var suffix=m[2]?(m[2].charCodeAt(0)-96)*0.1:0;
  return base+suffix;
}

function mergeSupabaseArticles(data){
  data.forEach(function(a){
    if(!a.id) return;
    var tabs=[];
    if(a.tabs) tabs=(typeof a.tabs==='string'?a.tabs:a.tabs.join(',')).split(',').map(function(t){return t.trim();}).filter(Boolean);
    DB[a.id]={
      t: a.treaty||'',
      n: a.article_num,
      fm: a.former_ref||'',
      pl: a.part_label||'',
      tl: a.titre_label||'',
      b: a.body_html||'',
      note: a.note||'',
      tabs: tabs.length?tabs:['jur','bib'],
      vers:[]
    };
    // Add to ORDER at the correct numeric position
    if(ORDER.indexOf(a.id)<0){
      var prefix=a.id.startsWith('tue-')?'tue-':'tfue-';
      var targetNum=numFromId(a.id);
      var insertIdx=-1;
      // Find the first article of same treaty with a higher number
      for(var i=0;i<ORDER.length;i++){
        if(!ORDER[i].startsWith(prefix)) continue;
        if(numFromId(ORDER[i])>targetNum){ insertIdx=i; break; }
      }
      if(insertIdx<0){
        // No higher-numbered article found → place at end of this treaty block
        if(prefix==='tue-'){
          // Insert just before the first TFUE
          insertIdx=ORDER.length;
          for(var j=0;j<ORDER.length;j++){ if(ORDER[j].startsWith('tfue-')){ insertIdx=j; break; } }
        } else {
          insertIdx=ORDER.length;
        }
      }
      ORDER.splice(insertIdx,0,a.id);
    }
  });
  // Refresh the TOC sidebar to include new articles
  injectSupabaseInTOC(data);
}

// ═══════════════════════════════════════════════════
//  INJECTION SUPABASE ARTICLES DANS LE SOMMAIRE TOC
// ═══════════════════════════════════════════════════
function injectSupabaseInTOC(data){
  data.forEach(function(a){
    if(!a.id) return;
    // Skip if already present in TOC
    var existing=document.querySelector('.tl[onclick*="\''+a.id+'\'"]');
    if(existing) return;

    var treaty=a.id.startsWith('tue-')?'TUE':'TFUE';
    var container=document.getElementById('ti'+treaty);
    if(!container) return;

    // Build the button
    var btn=document.createElement('button');
    btn.className='tl';
    btn.setAttribute('onclick',"goArt('"+a.id+"')");
    // Pas de suffixe TUE/TFUE — l'article est déjà sous son groupe
    var label='Art. '+a.article_num;
    if(a.titre_label){ label += ' — ' + a.titre_label.slice(0,45); }
    btn.textContent=label;

    // Find the correct position: insert before the first existing button with a higher number
    var targetNum=numFromId(a.id);
    var children=Array.prototype.slice.call(container.children);
    var inserted=false;
    for(var i=0;i<children.length;i++){
      var child=children[i];
      if(child.tagName!=='BUTTON') continue;
      var oc=child.getAttribute('onclick')||'';
      var m=oc.match(/'(tue-|tfue-)([^']+)'/);
      if(!m) continue;
      var childId=m[1]+m[2];
      if(numFromId(childId)>targetNum){
        container.insertBefore(btn,child);
        inserted=true;
        break;
      }
    }
    if(!inserted) container.appendChild(btn);
  });
}


// ═══════════════════════════════════════════════════
//  COPY PERMALINK
// ═══════════════════════════════════════════════════
function copyLink(id){
  var url=location.origin+location.pathname+'#'+id;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){showCopyToast();});
  } else {
    var ta=document.createElement('textarea');
    ta.value=url; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showCopyToast();
  }
}
function showCopyToast(msg){
  var t=document.getElementById('copyToast');
  if(!t){
    t=document.createElement('div'); t.id='copyToast';
    t.style.cssText='position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1c1917;color:#e5dfd4;padding:.5rem 1.2rem;font-size:.85rem;border-radius:4px;z-index:9999;pointer-events:none;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent=msg||'✓ Lien copié !'; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(function(){ t.style.opacity='0'; },2000);
}

(function init(){
  // Fetch articles from Supabase first, then render
  fetch('/api/get-code-articles')
    .then(function(r){ return r.ok?r.json():[]; })
    .then(function(data){
      if(data&&data.length) mergeSupabaseArticles(data);
    })
    .catch(function(){})
    .finally(function(){
      var n=Math.min(WIN,ORDER.length);
      renderRange(0,n); rs=0; re=n;
      setupIO();
      var h=location.hash.replace('#','');
      if(h&&DB[h]) setTimeout(function(){ goArt(h); },200);
    });
})();
// ═══════════════════════════════════════════════════
//  RE-RENDER WHEN ADMIN CHANGES SETTINGS (cross-tab)
// ═══════════════════════════════════════════════════
window.addEventListener('storage', function(ev){
  if(ev.key === 'irs_settings'){
    // Re-render all already-rendered articles that are in the DOM
    var rendered = document.querySelectorAll('.art[data-aid]');
    rendered.forEach(function(old){
      var id = old.dataset.aid;
      // Rebuild the element
      var fresh = buildEl(id);
      if(fresh){ old.parentNode.replaceChild(fresh, old); }
    });
    // Show a subtle toast
    var t = document.getElementById('copyToast');
    if(!t){
      t = document.createElement('div'); t.id = 'copyToast';
      t.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1c1917;color:#e5dfd4;padding:.5rem 1.2rem;font-size:.85rem;border-radius:4px;z-index:9999;pointer-events:none;transition:opacity .3s';
      document.body.appendChild(t);
    }
    t.textContent = '↻ Onglets mis à jour'; t.style.opacity = '1';
    clearTimeout(t._t); t._t = setTimeout(function(){ t.style.opacity = '0'; }, 2500);
  }
});
